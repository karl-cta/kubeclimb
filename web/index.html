<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>kubeclimb</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav id="sidebar">
    <div class="sidebar-header">
      <svg class="logo-icon" viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 20L10 5L14 13L18 7L23 20"/>
        <line x1="3" y1="20" x2="23" y2="20"/>
      </svg>
      <span class="logo-text">kubeclimb</span>
    </div>
    <div class="sidebar-progress">
      <div class="progress-bar"><div class="progress-fill" id="global-progress"></div></div>
      <span class="progress-label" id="progress-text">0 / 12 modules</span>
    </div>
    <div class="sidebar-xp" id="sidebar-xp"></div>
    <div class="sidebar-nav" id="module-list"></div>
    <div class="sidebar-footer">
      <div class="sidebar-footer-btns">
        <button class="btn-sm" id="btn-export">Exporter</button>
        <button class="btn-sm btn-danger" id="btn-reset">Réinitialiser</button>
      </div>
      <div class="sidebar-shortcuts"><kbd>&larr;</kbd> <kbd>&rarr;</kbd> naviguer</div>
    </div>
  </nav>

  <button id="menu-toggle" aria-label="Menu">
    <span></span><span></span><span></span>
  </button>
  <div id="sidebar-overlay"></div>

  <div id="reading-progress"></div>

  <main id="content"></main>

  <button id="back-to-top" aria-label="Retour en haut">
    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M18 15l-6-6-6 6"/>
    </svg>
  </button>

  <div id="toasts"></div>

  <script src="js/modules.js"></script>
  <script src="js/progress.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
